<script>
(function(){
  var toggle = document.querySelector('.nav-toggle');
  var menu = document.getElementById('mobile-menu');
  if (toggle && menu) {
    var closeMenu = function(){
      menu.classList.remove('is-open');
      toggle.classList.remove('is-active');
      toggle.setAttribute('aria-expanded', 'false');
    };
    toggle.addEventListener('click', function(){
      var isOpen = menu.classList.toggle('is-open');
      toggle.classList.toggle('is-active', isOpen);
      toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
    menu.querySelectorAll('a').forEach(function(a){
      a.addEventListener('click', closeMenu);
    });
  }

  // Desktop "More" dropdown — click-toggle so it also works on touch
  // devices at desktop widths (hover alone doesn't work there), with
  // :focus-within in CSS handling basic keyboard access.
  var dropdown = document.querySelector('.nav-dropdown');
  var dropdownTrigger = document.querySelector('.nav-dropdown-trigger');
  var dropdownMenu = document.querySelector('.nav-dropdown-menu');
  if (dropdown && dropdownTrigger && dropdownMenu) {
    var closeDropdown = function(){
      dropdownMenu.classList.remove('is-open');
      dropdownTrigger.classList.remove('is-active');
      dropdownTrigger.setAttribute('aria-expanded', 'false');
    };
    dropdownTrigger.addEventListener('click', function(e){
      e.stopPropagation();
      var isOpen = dropdownMenu.classList.toggle('is-open');
      dropdownTrigger.classList.toggle('is-active', isOpen);
      dropdownTrigger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
    document.addEventListener('click', function(e){
      if (!dropdown.contains(e.target)) closeDropdown();
    });
    dropdownMenu.querySelectorAll('a').forEach(function(a){
      a.addEventListener('click', closeDropdown);
    });
  }
})();
</script>
