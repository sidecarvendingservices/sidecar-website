<!-- GA4 lead-tracking: fires a "generate_lead" event whenever the HubSpot
     Free Evaluation form is actually submitted (not just viewed). HubSpot's
     embedded form posts a window message when this happens; this listener
     is harmless on pages that don't have the form at all. -->
<script>
  window.addEventListener('message', function (event) {
    if (
      event.data &&
      event.data.type === 'hsFormCallback' &&
      event.data.eventName === 'onFormSubmitted' &&
      typeof gtag === 'function'
    ) {
      gtag('event', 'generate_lead', {
        event_category: 'engagement',
        event_label: 'Free Evaluation Form',
        form_id: event.data.id || 'unknown',
      });
    }
  });
</script>
<!-- Back-to-top button: hidden until the visitor has scrolled down a bit,
     then fades in. Present on every page via this shared footer. -->
<script>
(function(){
  var btn = document.getElementById('back-to-top');
  if (!btn) return;
  var toggleVisibility = function(){
    if (window.scrollY > 600) {
      btn.classList.add('is-visible');
    } else {
      btn.classList.remove('is-visible');
    }
  };
  window.addEventListener('scroll', toggleVisibility, { passive: true });
  toggleVisibility();
  btn.addEventListener('click', function(){
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
})();
</script>
