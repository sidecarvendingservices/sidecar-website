<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<meta name="description" content="{{DESCRIPTION}}">
<link rel="canonical" href="{{CANONICAL}}">

<!-- Open Graph / Twitter Card — controls how links look when shared via text, social, etc. -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Sidecar Vending Services">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{DESCRIPTION}}">
<meta property="og:url" content="{{CANONICAL}}">
<meta property="og:image" content="https://sidecarservices.com/images/hero.jpg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{TITLE}}">
<meta name="twitter:description" content="{{DESCRIPTION}}">
<meta name="twitter:image" content="https://sidecarservices.com/images/hero.jpg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css?v={{STYLES_VERSION}}">

<!-- Sitewide business schema — identical on every page. If your Google
     Business Profile ever uses a different phone format, name, or coverage
     area than what's below, update it here to keep everything consistent. -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "LocalBusiness",
  "name": "Sidecar Vending Services",
  "url": "https://sidecarservices.com",
  "telephone": "+14708393656",
  "image": "https://sidecarservices.com/images/hero.jpg",
  "areaServed": [
    "Alpharetta, GA", "Milton, GA", "Roswell, GA", "Marietta, GA", "Kennesaw, GA",
    "Acworth, GA", "Smyrna, GA", "Mableton, GA", "Woodstock, GA", "Canton, GA",
    "Duluth, GA", "Norcross, GA", "Peachtree Corners, GA", "Sandy Springs, GA",
    "Dunwoody, GA", "Brookhaven, GA", "Chamblee, GA", "Atlanta, GA"
  ],
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "Atlanta",
    "addressRegion": "GA",
    "addressCountry": "US"
  }
}
</script>
</head>
<body>
{{HEADER}}
{{CONTENT}}
{{FOOTER}}
</body>
</html>
